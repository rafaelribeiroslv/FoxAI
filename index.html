    <style>

    <!-- Loader de Inicialização (Invisível após carregar) -->

        <div class="flex-1"></div>

        <!-- System Status -->
        <div class="space-y-4">
            <div class="flex items-center gap-3 px-2">
                <div class="w-9 h-9 rounded-full bg-orange-500/10 flex items-center justify-center text-orange-500 border border-orange-500/20">
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-black uppercase text-slate-400">Acesso Instantâneo</span>
                    <span class="text-[8px] text-green-500 font-bold uppercase tracking-widest">Proteção Ativa</span>
                </div>

            <p class="text-[9px] text-slate-600 px-2 font-medium italic">Conversas encriptadas e seguras.</p>
        </div>
        
        <button id="close-side" class="lg:hidden absolute top-10 -right-10 p-2 bg-orange-600 text-white rounded-r-xl">
            <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
    </aside>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col relative h-full">
        <header class="h-16 px-6 flex items-center justify-between glass border-b z-50">
            <div class="flex items-center gap-3">
                <button id="open-side" class="lg:hidden"><i data-lucide="menu" class="w-6 h-6"></i></button>
                <div class="flex flex-col">
                    <h2 class="font-black italic text-lg tracking-tighter leading-none">Fox <span class="text-orange-500">AI</span></h2>
                    <span class="text-[7px] font-bold uppercase tracking-[0.3em] text-slate-500 mt-0.5">Versão Estável 1.0</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-orange-500/10 text-orange-500"><i data-lucide="sun" id="t-icon" class="w-5 h-5"></i></button>
                <button onclick="clearChat()" class="p-2 text-slate-500 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
            </div>
        </header>

        <!-- Container de Chat -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 custom-scrollbar">
            <!-- As mensagens serão injetadas aqui -->
        </div>

        <!-- Indicador de Escrita -->
        <div id="typing" class="hidden px-8 py-2">
            <div class="flex items-center gap-2 text-orange-500 text-[9px] font-black uppercase tracking-[0.2em]">
                <div class="flex gap-1">
                    <span class="w-1 h-1 bg-orange-500 rounded-full animate-bounce"></span>
                    <span class="w-1 h-1 bg-orange-500 rounded-full animate-bounce [animation-delay:0.2s]"></span>
                    <span class="w-1 h-1 bg-orange-500 rounded-full animate-bounce [animation-delay:0.4s]"></span>
                </div>
                Fox a pensar...
            </div>
        </div>

        <!-- Footer com Input -->
        <footer class="p-4 md:p-8">
            <div class="max-w-3xl mx-auto">
                <form id="chat-form" class="flex items-center glass p-1.5 rounded-2xl border shadow-xl focus-within:border-orange-500/30 transition-all">
                    <button type="button" class="p-3 text-slate-500 hover:text-orange-500"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
                    <input type="text" id="user-in" placeholder="Diz-me algo..." class="flex-1 bg-transparent border-none text-sm py-3 px-2 focus:ring-0 outline-none">
                    <button type="submit" class="p-3 bg-orange-600 text-white rounded-xl shadow-lg active:scale-90 transition-all flex items-center justify-center">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </form>
            </div>
        </footer>
    </main>

    <script>
        // Configurações Globais
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fox-ai-final-v1';
        const apiKey = ""; // Chave da API Gemini (Injetada pelo ambiente)

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        lucide.createIcons();

        // Variável de controle do utilizador
        let currentUserId = null;

        // LOGIN AUTOMÁTICO (ESSENCIAL PARA O CHAT FUNCIONAR)
        async function autoAuth() {
            try {
                // Tenta entrar de forma anónima silenciosamente
                const cred = await auth.signInAnonymously();
                currentUserId = cred.user.uid;
                
                // Esconder o loader e iniciar sincronização
                document.getElementById('init-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('init-loader').style.display = 'none', 500);
                
                startChatSync();
            } catch (err) {
                console.error("Erro na autenticação automática:", err);
                // Fallback para ID local se o Firebase Auth falhar temporariamente
                currentUserId = localStorage.getItem('fox_local_id') || 'local_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('fox_local_id', currentUserId);
                
                document.getElementById('init-loader').style.display = 'none';
                startChatSync();
            }
        }

        // TEMA
        function toggleTheme() {
            const body = document.getElementById('main-body');
            const icon = document.getElementById('t-icon');
            if (body.classList.contains('dark')) {
                body.classList.replace('dark', 'light');
                icon.setAttribute('data-lucide', 'moon');
            } else {
                body.classList.replace('light', 'dark');
                icon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        }

        // SIDEBAR
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        document.getElementById('open-side').onclick = () => { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); };
        document.getElementById('close-side').onclick = () => { sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden'); };
        overlay.onclick = () => document.getElementById('close-side').click();

        // SINCRONIZAÇÃO DE MENSAGENS
        function startChatSync() {
            if (!currentUserId) return;
            const container = document.getElementById('chat-box');
            
            // Ouvir mensagens da coleção específica do utilizador
            db.collection('artifacts').doc(appId).collection('users').doc(currentUserId).collection('messages')
                .onSnapshot(snap => {
                    const messages = [];
                    snap.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
                    
                    // Ordenar por timestamp (segundos)
                    messages.sort((a, b) => {
                        const timeA = a.createdAt?.seconds || 0;
                        const timeB = b.createdAt?.seconds || 0;
                        return timeA - timeB;
                    });

                    container.innerHTML = '';
                    if (messages.length === 0) {
                        container.innerHTML = `
                            <div class="flex flex-col items-center justify-center h-full opacity-20 text-center px-10 animate-pulse">
                                <i data-lucide="bot" class="w-16 h-16 mb-4 text-orange-500"></i>
                                <p class="text-[10px] font-black uppercase tracking-[0.4em]">Inicia uma conversa com o Fox</p>
                            </div>`;
                        lucide.createIcons();
                    } else {
                        messages.forEach(m => {
                            const div = document.createElement('div');
                            div.className = `flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'} animate-msg`;
                            div.innerHTML = `
                                <div class="max-w-[85%] md:max-w-[70%] p-4 text-sm font-medium leading-relaxed ${m.sender === 'user' ? 'message-user' : 'message-bot'}">
                                    ${m.text}
                                </div>
                            `;
                            container.appendChild(div);
                        });
                        // Scroll automático para a última mensagem
                        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
                    }
                }, err => {
                    console.error("Erro ao sincronizar Firestore:", err);
                });
        }

        // ENVIO DE MENSAGEM
        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-in');
            const text = input.value.trim();
            
            if (!text || !currentUserId) return;

            input.value = '';
            
            try {
                // 1. Gravar mensagem do utilizador no Firebase
                await db.collection('artifacts').doc(appId).collection('users').doc(currentUserId).collection('messages').add({
                    text,
                    sender: 'user',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Mostrar indicador de escrita
                document.getElementById('typing').classList.remove('hidden');

                // 2. Chamar API Gemini
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text }] }],
                        systemInstruction: { parts: [{ text: "Tu és o Fox AI V1.0. Responde sempre em Português de Portugal. Foste criado pelo Rafael Ribeiro. Mantém as respostas diretas, úteis e profissionais." }] }
                    })
                });

                const data = await response.json();
                const aiReply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Desculpa, não consegui processar o teu pedido.";

                // 3. Gravar resposta da IA no Firebase
                await db.collection('artifacts').doc(appId).collection('users').doc(currentUserId).collection('messages').add({
                    text: aiReply,
                    sender: 'bot',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

            } catch (err) {
                console.error("Erro no fluxo de mensagens:", err);
            } finally {
                document.getElementById('typing').classList.add('hidden');
            }
        };

        // LIMPAR CHAT
        async function clearChat() {
            if (!currentUserId) return;
            try {
                const snap = await db.collection('artifacts').doc(appId).collection('users').doc(currentUserId).collection('messages').get();
                const batch = db.batch();
                snap.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
            } catch (err) {
                console.error("Erro ao limpar chat:", err);
            }
        }

        // Iniciar Autenticação ao carregar
        window.onload = autoAuth;
    </script>
</body>
</html>
