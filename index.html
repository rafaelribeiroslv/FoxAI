            </div>

            <div class="flex items-center gap-3 bg-orange-600/5 px-6 py-3 rounded-full border border-orange-600/20 w-fit">
                <i data-lucide="loader-2" class="w-4 h-4 text-orange-500 animate-spin"></i>
                <span id="status-text" class="text-[9px] font-black text-orange-500 uppercase tracking-widest">A pensar...</span>

                    <button id="remove-file" class="p-1 bg-red-500 text-white rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>

                <form id="chat-form" class="flex items-center bg-[#111218] p-2 rounded-[2.5rem] border border-white/5 shadow-2xl">

                    <button type="button" id="btn-attach" class="p-4 text-slate-500 hover:text-orange-500"><i data-lucide="paperclip" class="w-6 h-6"></i></button>

    <script>
        // --- CONFIGURAÇÃO ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fox-ai-web-v1';
        const apiKey = ""; 

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // UI Elements
        const loginScreen = document.getElementById('login-screen');
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const fileInput = document.getElementById('file-input');
        const sidebar = document.getElementById('sidebar');
        const typingIndicator = document.getElementById('typing-indicator');

        let currentUser = null;
        let attachedFile = null;

        // Init Lucide
        lucide.createIcons();

        // Auth Logic
        document.getElementById('btn-login').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        };

        document.getElementById('btn-logout').onclick = () => auth.signOut();

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                loginScreen.classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-avatar').innerText = user.displayName.charAt(0);
                loadMessages();
            } else {
                loginScreen.classList.remove('opacity-0', 'pointer-events-none');
                chatContainer.innerHTML = '';
            }
        });

        // Sidebar Control
        document.getElementById('open-sidebar').onclick = () => sidebar.classList.remove('-translate-x-full');
        document.getElementById('close-sidebar').onclick = () => sidebar.classList.add('-translate-x-full');

        // File Logic
        document.getElementById('btn-attach').onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                attachedFile = { name: file.name, type: file.type, data: reader.result };
                document.getElementById('file-preview').classList.remove('hidden');
                const box = document.getElementById('preview-box');
                if (file.type.startsWith('image/')) {
                    box.innerHTML = `<img src="${reader.result}" class="w-full h-full object-cover">`;
                } else {
                    box.innerHTML = `<i data-lucide="film" class="text-orange-500"></i>`;
                    lucide.createIcons();
                }
            };
            reader.readAsDataURL(file);
        };

        document.getElementById('remove-file').onclick = () => {
            attachedFile = null;
            document.getElementById('file-preview').classList.add('hidden');
        };

        // Message Logic
        function addMessage(msg) {
            document.getElementById('empty-state').style.display = 'none';
            const div = document.createElement('div');
            div.className = `flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'} animate-msg`;
            
            const content = `
                <div class="flex gap-3 max-w-[85%] ${msg.sender === 'user' ? 'flex-row-reverse' : ''}">
                    <div class="w-10 h-10 rounded-xl flex-shrink-0 flex items-center justify-center mt-1 shadow-lg ${msg.sender === 'user' ? 'bg-slate-800' : 'bg-orange-600'}">
                        <i data-lucide="${msg.sender === 'user' ? 'user' : 'bot'}" class="w-5 h-5 text-white"></i>
                    </div>
                    <div class="flex flex-col gap-1">
                        <div class="p-5 ${msg.sender === 'user' ? 'message-user text-white' : 'message-bot text-slate-200'}">
                            ${msg.file || msg.genFile ? `
                                <div class="mb-4 rounded-xl overflow-hidden bg-black/20">
                                    ${(msg.file || msg.genFile).type.includes('video') ? 
                                        `<video src="${(msg.file || msg.genFile).data}" controls class="w-full max-h-96"></video>` :
                                        `<img src="${(msg.file || msg.genFile).data}" class="w-full max-h-96 object-contain">`
                                    }
                                </div>
                            ` : ''}
                            <p class="text-[15px] leading-relaxed font-medium">${msg.text || ''}</p>
                        </div>
                    </div>
                </div>
            `;
            div.innerHTML = content;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            lucide.createIcons();
        }

        function loadMessages() {
            db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('messages')
                .orderBy('createdAt', 'asc')
                .onSnapshot(snap => {
                    chatContainer.innerHTML = '';
                    if (snap.empty) {
                        document.getElementById('empty-state').style.display = 'flex';
                    } else {
                        snap.forEach(doc => addMessage(doc.data()));
                    }
                });
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text && !attachedFile) return;

            const msgData = {
                text,
                sender: 'user',
                file: attachedFile,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            userInput.value = '';
            attachedFile = null;
            document.getElementById('file-preview').classList.add('hidden');
            
            await db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('messages').add(msgData);

            // Bot Response
            typingIndicator.classList.remove('hidden');
            const prompt = text.toLowerCase();
            const isVideo = prompt.includes('video') || prompt.includes('vídeo');
            const isImage = !isVideo && (prompt.includes('gera') || prompt.includes('imagem'));

            let botMsg = { sender: 'bot', text: '', genFile: null, createdAt: firebase.firestore.FieldValue.serverTimestamp() };

            try {
                if (isVideo) {
                    await new Promise(r => setTimeout(r, 6000));
                    botMsg.text = "Vídeo gerado pelo núcleo Fox AI.";
                    botMsg.genFile = { data: "https://storage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4", type: 'video/mp4' };
                } else if (isImage) {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({ contents: [{ parts: [{ text }] }], generationConfig: { responseModalities: ['TEXT', 'IMAGE'] } })
                    });
                    const data = await res.json();
                    const b64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    botMsg.text = "Geração concluída.";
                    botMsg.genFile = b64 ? { data: `data:image/png;base64,${b64}`, type: 'image/png' } : null;
                } else {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text }] }],
                            systemInstruction: { parts: [{ text: "Tu és o Fox AI V1.0. Responde em Português de Portugal. Foste criado por Rafael Ribeiro." }] }
                        })
                    });
                    const data = await res.json();
                    botMsg.text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Erro.";
                }
                await db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('messages').add(botMsg);
            } catch (err) { console.error(err); }
            typingIndicator.classList.add('hidden');
        };

        document.getElementById('btn-clear').onclick = async () => {
            const snap = await db.collection('artifacts').doc(appId).collection('users').doc(currentUser.uid).collection('messages').get();
            snap.forEach(doc => doc.ref.delete());
        };
    </script>
</body>
</html>
