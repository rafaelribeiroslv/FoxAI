    <script>
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fox-ai-v1-master';
        const apiKey = ""; 

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const loginScreen = document.getElementById('login-screen');
        const chatContainer = document.getElementById('chat-container');
        const appBody = document.getElementById('app-body');
        const themeIcon = document.getElementById('theme-icon');
        const typingIndicator = document.getElementById('typing-indicator');

        lucide.createIcons();

        // Theme Toggle
        document.getElementById('btn-theme').onclick = () => {
            if (appBody.classList.contains('dark')) {
                appBody.classList.replace('dark', 'light');
                themeIcon.setAttribute('data-lucide', 'moon');
            } else {
                appBody.classList.replace('light', 'dark');
                themeIcon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        };

        // Sidebar Controls
        const toggleSidebar = (show) => {
            document.getElementById('sidebar').classList.toggle('-translate-x-full', !show);
            document.getElementById('sidebar-overlay').classList.toggle('active', show);
        };

        document.getElementById('open-sidebar').onclick = () => toggleSidebar(true);
        document.getElementById('close-sidebar').onclick = () => toggleSidebar(false);
        document.getElementById('sidebar-overlay').onclick = () => toggleSidebar(false);

        // Auth Logic
        const handleAuth = async (method) => {
            document.getElementById('auth-actions').classList.add('hidden');
            document.getElementById('auth-loading').classList.remove('hidden');
            try {
                if (method === 'google') {
                    await auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());
                } else {
                    await auth.signInAnonymously();
                }
            } catch (err) {
                alert("Erro na autenticação.");
                document.getElementById('auth-actions').classList.remove('hidden');
                document.getElementById('auth-loading').classList.add('hidden');
            }
        };

        document.getElementById('btn-login-google').onclick = () => handleAuth('google');
        document.getElementById('btn-login-anon').onclick = () => handleAuth('anon');
        document.getElementById('btn-logout').onclick = () => auth.signOut();

        auth.onAuthStateChanged(user => {
            if (user) {
                loginScreen.classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('user-name').innerText = user.displayName || "Convidado";
                document.getElementById('user-avatar').innerText = (user.displayName || "C").charAt(0);
                syncMessages(user.uid);
            } else {
                loginScreen.classList.remove('opacity-0', 'pointer-events-none');
            }
        });

        // Firestore Sync
        function syncMessages(uid) {
            db.collection('artifacts').doc(appId).collection('users').doc(uid).collection('messages')
                .orderBy('createdAt', 'asc')
                .onSnapshot(snap => {
                    chatContainer.innerHTML = '';
                    if (snap.empty) {
                        document.getElementById('empty-state').classList.remove('hidden');
                    } else {
                        document.getElementById('empty-state').classList.add('hidden');
                        snap.forEach(doc => {
                            const m = doc.data();
                            const msgDiv = document.createElement('div');
                            msgDiv.className = `flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'} msg-anim`;
                            msgDiv.innerHTML = `
                                <div class="max-w-[85%] p-5 text-[15px] font-medium leading-relaxed ${m.sender === 'user' ? 'message-user' : 'message-bot'}">
                                    ${m.text}
                                </div>
                            `;
                            chatContainer.appendChild(msgDiv);
                        });
                        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
                    }
                });
        }

        // Chat Submission
        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text || !auth.currentUser) return;

            input.value = '';
            const uid = auth.currentUser.uid;
            
            await db.collection('artifacts').doc(appId).collection('users').doc(uid).collection('messages').add({
                text, sender: 'user', createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            typingIndicator.classList.remove('hidden');
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [{ text }] }],
                        systemInstruction: { parts: [{ text: "Tu és o Fox AI V1.0. Responde em Português de Portugal. Foste criado por Rafael Ribeiro." }] }
                    })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;

                await db.collection('artifacts').doc(appId).collection('users').doc(uid).collection('messages').add({
                    text: reply, sender: 'bot', createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (err) {
                console.error(err);
            }
            typingIndicator.classList.add('hidden');
        };

        document.getElementById('btn-clear').onclick = async () => {
            if (!auth.currentUser) return;
            const snap = await db.collection('artifacts').doc(appId).collection('users').doc(auth.currentUser.uid).collection('messages').get();
            const batch = db.batch();
            snap.forEach(d => batch.delete(d.ref));
            await batch.commit();
        };

        document.getElementById('btn-attach').onclick = () => document.getElementById('file-input').click();
    </script>
</body>
</html>
