```html
<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fox AI V1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease;
        }

        .dark { background-color: #050507; color: #e2e8f0; }
        .light { background-color: #f1f5f9; color: #0f172a; }

        .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .dark .glass { background: rgba(0, 0, 0, 0.75); border-color: rgba(255,255,255,0.05); }
        .light .glass { background: rgba(255, 255, 255, 0.85); border-color: rgba(0,0,0,0.05); }

        .message-user {
            background: linear-gradient(135deg, #ea580c, #f97316);
            color: white;
            border-radius: 1.5rem 1.5rem 0.2rem 1.5rem;
            box-shadow: 0 4px 15px rgba(234, 88, 12, 0.2);
        }

        .dark .message-bot {
            background: #111218;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1.5rem 1.5rem 1.5rem 0.2rem;
        }

        .light .message-bot {
            background: white;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 1.5rem 1.5rem 1.5rem 0.2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ea580c; border-radius: 10px; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-msg { animation: fadeInUp 0.3s ease forwards; }
    </style>
</head>
<body class="dark h-screen w-full flex overflow-hidden" id="main-body">

    <div id="sidebar-overlay" class="fixed inset-0 z-[140] bg-black/60 hidden lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-[150] w-72 transform -translate-x-full lg:translate-x-0 transition-transform duration-500 glass border-r flex flex-col p-6">
        <div class="mt-2 p-5 rounded-[2rem] bg-orange-500/5 border border-orange-500/10 mb-8">
            <div class="flex items-center gap-3 mb-3">
                <div class="w-12 h-12 rounded-full bg-orange-600 flex items-center justify-center text-white font-black text-lg shadow-lg">RR</div>
                <div class="flex flex-col overflow-hidden">
                    <div class="flex items-center gap-1">
                        <span class="font-black text-sm truncate">Rafael Ribeiro</span>
                        <i data-lucide="badge-check" class="w-4 h-4 text-blue-500 fill-blue-500/20"></i>
                    </div>
                    <span class="text-[9px] font-black text-orange-500 uppercase tracking-tighter">Criador Oficial</span>
                </div>
            </div>
            <p class="text-[9px] text-slate-500 font-bold border-t border-white/5 pt-3">rafael2021tutorial@gmail.com</p>
        </div>

        <div class="flex-1"></div>
        
        <div class="p-4 bg-orange-500/5 rounded-2xl border border-orange-500/10">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                <span class="text-[10px] font-black uppercase text-slate-400">Sistema Ativo</span>
            </div>
        </div>

        <button id="close-side" class="lg:hidden absolute top-10 -right-10 p-2 bg-orange-600 text-white rounded-r-xl">
            <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative h-full">
        <header class="h-16 px-6 flex items-center justify-between glass border-b z-50">
            <div class="flex items-center gap-3">
                <button id="open-side" class="lg:hidden"><i data-lucide="menu" class="w-6 h-6"></i></button>
                <div class="flex flex-col">
                    <h2 class="font-black italic text-lg tracking-tighter leading-none">Fox <span class="text-orange-500">AI</span></h2>
                    <span class="text-[7px] font-bold text-slate-500 uppercase tracking-[0.2em]">V1.0 Stable</span>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-2.5 rounded-xl bg-orange-500/10 text-orange-500"><i data-lucide="sun" id="t-icon" class="w-5 h-5"></i></button>
                <button onclick="clearChat()" class="p-2 text-slate-500 hover:text-red-500 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 custom-scrollbar">
            <!-- Messages area -->
        </div>

        <div id="typing" class="hidden px-8 py-2">
            <div class="flex items-center gap-2 text-orange-500 text-[9px] font-black uppercase tracking-[0.2em]">
                <i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i> Fox a responder...
            </div>
        </div>

        <footer class="p-4 md:p-8">
            <div class="max-w-3xl mx-auto">
                <form id="chat-form" class="flex items-center glass p-1.5 rounded-2xl border shadow-xl focus-within:border-orange-500/30 transition-all">
                    <button type="button" class="p-3 text-slate-500 hover:text-orange-500"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
                    <input type="text" id="user-in" placeholder="Escreve a tua mensagem..." class="flex-1 bg-transparent border-none text-sm py-3 px-2 focus:ring-0 outline-none" autocomplete="off">
                    <button type="submit" class="p-3 bg-orange-600 text-white rounded-xl shadow-lg active:scale-95 transition-all">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </form>
            </div>
        </footer>
    </main>

    <script>
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fox-ai-v1-direct';
        const apiKey = ""; 

        // Firebase Initialization
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        lucide.createIcons();

        let userId = localStorage.getItem('fox_persistent_id');

        // Silent Bootstrapping
        (async function init() {
            try {
                // Tenta recuperar sessão ou criar anónima silenciosamente
                if (!auth.currentUser) {
                    const cred = await auth.signInAnonymously();
                    userId = cred.user.uid;
                    localStorage.setItem('fox_persistent_id', userId);
                } else {
                    userId = auth.currentUser.uid;
                }
                startSync();
            } catch (e) {
                if (!userId) {
                    userId = 'user_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('fox_persistent_id', userId);
                }
                startSync();
            }
        })();

        function toggleTheme() {
            const body = document.getElementById('main-body');
            const icon = document.getElementById('t-icon');
            if (body.classList.contains('dark')) {
                body.classList.replace('dark', 'light');
                icon.setAttribute('data-lucide', 'moon');
            } else {
                body.classList.replace('light', 'dark');
                icon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        }

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        document.getElementById('open-side').onclick = () => { sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden'); };
        document.getElementById('close-side').onclick = () => { sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden'); };
        overlay.onclick = () => document.getElementById('close-side').click();

        function startSync() {
            const container = document.getElementById('chat-box');
            db.collection('artifacts').doc(appId).collection('users').doc(userId).collection('messages')
                .onSnapshot(snap => {
                    const msgs = [];
                    snap.forEach(d => msgs.push({id: d.id, ...d.data()}));
                    
                    // Ordenação robusta em memória
                    msgs.sort((a, b) => {
                        const timeA = a.createdAt?.toMillis ? a.createdAt.toMillis() : (a._localTime || 0);
                        const timeB = b.createdAt?.toMillis ? b.createdAt.toMillis() : (b._localTime || 0);
                        return timeA - timeB;
                    });

                    container.innerHTML = '';
                    if (msgs.length === 0) {
                        container.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full opacity-20 text-center px-10">
                            <i data-lucide="message-circle" class="w-12 h-12 mb-4 text-orange-500"></i>
                            <p class="text-[9px] font-black uppercase tracking-[0.3em]">Fox AI Pronto</p>
                        </div>`;
                        lucide.createIcons();
                    } else {
                        msgs.forEach(m => {
                            const div = document.createElement('div');
                            div.className = `flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'} animate-msg`;
                            div.innerHTML = `<div class="max-w-[85%] p-4 text-sm font-medium leading-relaxed ${m.sender === 'user' ? 'message-user' : 'message-bot'}">${m.text}</div>`;
                            container.appendChild(div);
                        });
                        container.scrollTop = container.scrollHeight;
                    }
                });
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-in');
            const text = input.value.trim();
            if (!text || !userId) return;

            input.value = '';
            const localTime = Date.now();

            try {
                // Envio para o Firebase
                await db.collection('artifacts').doc(appId).collection('users').doc(userId).collection('messages').add({
                    text, sender: 'user', createdAt: firebase.firestore.FieldValue.serverTimestamp(), _localTime: localTime
                });

                document.getElementById('typing').classList.remove('hidden');

                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text }] }],
                        systemInstruction: { parts: [{ text: "És o Fox AI V1.0, criado por Rafael Ribeiro. Responde sempre em Português de Portugal." }] }
                    })
                });

                const data = await res.json();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Erro ao processar.";

                await db.collection('artifacts').doc(appId).collection('users').doc(userId).collection('messages').add({
                    text: reply, sender: 'bot', createdAt: firebase.firestore.FieldValue.serverTimestamp(), _localTime: Date.now()
                });
            } catch (err) {
                console.error(err);
            } finally {
                document.getElementById('typing').classList.add('hidden');
            }
        };

        async function clearChat() {
            if (!userId) return;
            const snap = await db.collection('artifacts').doc(appId).collection('users').doc(userId).collection('messages').get();
            const batch = db.batch();
            snap.forEach(d => batch.delete(d.ref));
            await batch.commit();
        }
    </script>
</body>
</html>
